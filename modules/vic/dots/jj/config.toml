#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Victor Borja"
email = "vborja@apache.org"

[ui]
default-command = "status"

[aliases]
l = [
    "log",
    "-r",
    "compared_to_trunk()",
    "--config",
    "template-aliases.'format_short_id(id)'='id.shortest().upper()'",
    "--config",
    "template-aliases.'format_short_change_id(id)'='id.shortest().upper()'",
    "--config",
    "template-aliases.'format_timestamp(timestamp)'='timestamp.ago()'",
]
ll = ["log", "-r", ".."]
lr = ["log", "-r", "default() & recent()"]
s = ["show"]
sD = [
    "squash",
    "-i",
    "-f",
    "@-",
    "-t",
    "@",
]
sU = [
    "squash",
    "-i",
    "-f",
    "@+",
    "-t",
    "@",
]
sd = [
    "squash",
    "-i",
    "-f",
    "@",
    "-t",
    "@-",
]
sq = ["squash", "-i"]
su = [
    "squash",
    "-i",
    "-f",
    "@",
    "-t",
    "@+",
]
tug = [
    "bookmark",
    "move",
    "--from",
    "closest_bookmark(@-)",
    "--to",
    "@-",
]


[signing]
backend = "ssh"
behaviour = "own"
key = "~/.ssh/id_ed25519.pub"

[template-aliases]
"format_short_change_id(id)" = "format_short_id(id)"
"format_short_id(id)" = "id.shortest().upper()"
"format_short_signature(signature)" = "signature.email().local()"
"format_timestamp(timestamp)" = "timestamp.ago()"

